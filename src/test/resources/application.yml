spring:
  jpa:
    hibernate:
      ddl-auto: create-drop

outbox:
  lock-type: db
  db-lock:
    recovery-timeout-seconds: 30
  scheduler:
    interval-seconds: 60
  retry:
    default:
      max-count: 5
      base-seconds: 60
    strategies:
      MOCK_CREATED:
        max-count: 5
        base-seconds: 60
