spring:
  application:
    name: outbox
  datasource:
    url: jdbc:mysql://localhost:3306/outbox
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: update

outbox:
  scheduler:
    interval-seconds: 60
    recovery-timeout-seconds: 30
  retry:
    default:
      max-count: 5
      base-seconds: 60
    strategies:
      MOCK_CREATED:
        max-count: 5
        base-seconds: 60
